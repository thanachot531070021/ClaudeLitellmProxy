version: "3.9"

services:

  # ===== 1. OTel Collector — รับข้อมูลจาก Claude Code พนักงาน =====
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config", "/etc/otel/config.yaml"]
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
    environment:
      - POSTGRES_CONN=${POSTGRES_CONN}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===== 2. PostgreSQL — เก็บ log ทุก request =====
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: claude_monitoring
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d claude_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== 3. Grafana — Dashboard แสดงผล =====
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
