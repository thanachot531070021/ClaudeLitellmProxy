receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 100

exporters:
  file:
    path: /var/log/claude-usage/otel-logs.jsonl
    rotation:
      max_megabytes: 50
      max_days: 30
      max_backups: 5

  otlphttp/worker:
    endpoint: https://claude-usage-logger.cloudflare-training3.workers.dev/ingest/otel
    headers:
      X-API-Key: "${CF_WORKER_SECRET}"
    compression: none

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, otlphttp/worker]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, otlphttp/worker]
